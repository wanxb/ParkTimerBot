[DEFAULT]
# Telegram bot token (replace with your token in a local config.ini)
TOKEN = your-telegram-bot-token-here

# Configurable parameters (units: minutes unless noted)
# 免费时长（默认：30 分钟）
FREE_MINUTES = 30
# 在计费节点前提前提醒的分钟数（默认：5 分钟）
PRE_ALERT_MINUTES = 5
# 提醒周期（分钟），例如每小时提醒一次（默认：60）
REMIND_INTERVAL_MINUTES = 60
# 生成提醒的未来范围（小时），默认 168 小时 = 7 天
REMIND_HOURS = 168
# 离场宽限期（分钟），默认 30
EXIT_GRACE_MINUTES = 30
